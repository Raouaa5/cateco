services:
  php:
    image: ghcr.io/sylius/sylius-php:8.3-alpine
    volumes:
      - .:/srv/sylius:delegated
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: prod
      APP_DEBUG: '0'
      SYLIUS_TIMEZONE: Europe/Paris
      DATABASE_URL: "mysql://sylius:sylius@mysql:3306/sylius?serverVersion=8.0"

  mysql:
    image: mysql:8.0
    platform: linux/amd64  
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sylius
      MYSQL_USER: sylius
      MYSQL_PASSWORD: sylius
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      interval: 10s
      retries: 10

  nginx:
    image: nginx:alpine  # ← NGINX OFFICIEL (stable)
    ports:
      - "8080:80"
    volumes:
      - .:/srv/sylius:delegated,ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf  # ← CONFIG CUSTOM
    depends_on:
      - php

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
  node:
     image: node:20-alpine
     working_dir: /srv/sylius
     volumes:
     - .:/srv/sylius:delegated
     command: tail -f /dev/null
  mailhog:
     image: axllent/mailpit
     ports:
      - "1025:1025"
      - "8025:8025"

  # ── FastAPI recommender (CATECO V4) ───────────────────────────────────────
  recommender:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Share the full project so api/ and ml/ are both visible inside the container
      - .:/srv/sylius:delegated
    environment:
      # Must match ML_REFRESH_TOKEN in the php service
      REFRESH_TOKEN: ${ML_REFRESH_TOKEN:-changeme}
      TOP_K_DEFAULT: "5"
      MODEL_PATH: /srv/sylius/ml/svd_model_v4.pkl
      HYBRID_CSV:  /srv/sylius/ml/interactions_hybrid.csv
    depends_on:
      - mysql
    restart: unless-stopped

  # ── Nightly ML cron (runs every night at 02:00) ───────────────────────────
  ml-cron:
    image: ghcr.io/sylius/sylius-php:8.3-alpine
    volumes:
      - .:/srv/sylius:delegated
    working_dir: /srv/sylius
    environment:
      APP_ENV: prod
      APP_DEBUG: '0'
      DATABASE_URL: "mysql://sylius:sylius@mysql:3306/sylius?serverVersion=8.0"
      ML_REFRESH_TOKEN: ${ML_REFRESH_TOKEN:-changeme}
    depends_on:
      mysql:
        condition: service_healthy
      recommender:
        condition: service_started
    # Run cron daemon: every night at 02:00 UTC, trigger the Symfony command
    command: >
      sh -c "
        echo '0 2 * * * cd /srv/sylius && php bin/console app:ml:retrain >> /var/log/ml-retrain.log 2>&1' | crontab - &&
        crond -f -l 2
      "
    restart: unless-stopped

volumes:
  db_data:
    external: true
    name: catecov2_db_data
