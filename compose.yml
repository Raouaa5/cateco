services:
  php:
    image: ghcr.io/sylius/sylius-php:8.3-alpine
    volumes:
      - .:/srv/sylius
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    expose:
      - "9000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: dev
      SYLIUS_TIMEZONE: Europe/Paris
      DATABASE_URL: "mysql://sylius:sylius@mysql:3306/sylius?serverVersion=8.0"

  mysql:
    image: mysql:8.0
    platform: linux/amd64  
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sylius
      MYSQL_USER: sylius
      MYSQL_PASSWORD: sylius
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      interval: 10s
      retries: 10

  nginx:
    image: nginx:alpine  # ← NGINX OFFICIEL (stable)
    ports:
      - "8080:80"
    volumes:
      - .:/srv/sylius:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf  # ← CONFIG CUSTOM
    depends_on:
      - php

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql
  node:
     image: node:20-alpine
     working_dir: /srv/sylius
     volumes:
     - .:/srv/sylius
     command: tail -f /dev/null
  mailhog:
     image: axllent/mailpit
     ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db_data:
    external: true
    name: catecov2_db_data
