services:
  - type: web
    name: cateco-recommender-api
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REFRESH_TOKEN
        generateValue: true        # Render auto-generates a secure value
      - key: TOP_K_DEFAULT
        value: "5"
    plan: free
