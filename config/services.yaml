services:
    # Default configuration for services in *this* file
    _defaults:
        # Automatically injects dependencies in your services
        autowire: true

        # Automatically registers your services as commands, event subscribers, etc.
        autoconfigure: true

        # Allows optimizing the container by removing unused services; this also means
        # fetching services directly from the container via $container->get() won't work
        public: false

    _instanceof:
        Sylius\Bundle\ResourceBundle\Controller\ResourceController:
            autowire: false
        Sylius\Bundle\ResourceBundle\Form\Type\AbstractResourceType:
            autowire: false

    # Makes classes in src/ available to be used as services;
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/*'
        exclude: '../src/{Entity,Kernel.php}'

    # Controllers are imported separately to make sure services can be injected
    # as action arguments even if you don't extend any base controller class
    App\Controller\:
        resource: '../src/Controller'
        tags: ['controller.service_arguments']

    App\Controller\Shop\ProductReviewController:
        arguments:
            $productReviewRepository: '@sylius.repository.product_review'
            $channelContext: '@sylius.context.channel'
            $localeContext: '@sylius.context.locale'
        tags: ['controller.service_arguments']

    App\EventListener\UserRegisteredListener:
        tags:
            - { name: kernel.event_listener, event: sylius.customer.post_register, method: onUserRegister }

    App\EventListener\OrderPlacedListener:
        tags:
            - { name: kernel.event_listener, event: sylius.order.post_complete, method: __invoke }

    App\EventListener\AccountMenuListener:
        tags:
            - { name: kernel.event_listener, event: sylius.menu.shop.account, method: addWishlistItem }

    App\EventListener\CartRestorationListener:
        arguments:
            $cartStorage: '@sylius_shop.storage.cart_session'
            $channelContext: '@sylius.context.channel'
        tags:
            - { name: kernel.event_listener, event: security.interactive_login, method: onSecurityInteractiveLogin, priority: -10 }

    App\Controller\CartItemRemoveController:
        arguments:
            $orderProcessor: '@sylius.order_processing.order_processor'
        tags: ['controller.service_arguments']

    sylius_admin.controller.dashboard:
        class: App\Controller\Admin\DashboardController
        public: true
        arguments:
            - '@sylius.repository.channel'
            - '@twig'
            - '@router'
        tags: ['controller.service_arguments']

    # ── Session storage (PDO — persists across PHP-FPM workers) ─────────────
    session.handler.pdo:
        class: Symfony\Component\HttpFoundation\Session\Storage\Handler\PdoSessionHandler
        arguments:
            - '%env(DATABASE_URL)%'
            - { db_table: 'sessions', db_id_col: 'sess_id', db_data_col: 'sess_data', db_time_col: 'sess_time', db_lifetime_col: 'sess_lifetime', lock_mode: 1 }

    # ── ML Recommendation Services ──────────────────────────────────────────
    App\Service\RecommendationService:
        arguments:
            $httpClient: '@http_client'
            $productRepository: '@sylius.repository.product'
            $cache: '@cateco.cache.recommendations'
            $logger: '@logger'
    # RecommendationExtension and ProductRecommendationsContextProvider
    # are auto-wired via the App\ resource scan above.