# config/routes.yaml
cateco_product_search:
    path: /{_locale}/search
    methods: [GET]
    defaults: { _locale: fr, _controller: App\Controller\Shop\SearchController::search, _sylius: { template: "Shop/Search/results.html.twig" } }
    requirements:
        _locale: ^[A-Za-z]{2,4}(_([A-Za-z]{4}|[0-9]{3}))?(_([A-Za-z]{2}|[0-9]{3}))?$

app_club_cateco_index:
    path: /{_locale}/club-cateco
    methods: [GET]
    controller: App\Controller\ClubCatecoController::index
    requirements:
        _locale: ^[A-Za-z]{2,4}(_([A-Za-z]{4}|[0-9]{3}))?(_([A-Za-z]{2}|[0-9]{3}))?$

sylius_shop_homepage:
    path: /{_locale}/
    methods: [GET]
    controller: App\Controller\HomepageController::index
    requirements:
        _locale: ^[A-Za-z]{2,4}(_([A-Za-z]{4}|[0-9]{3}))?(_([A-Za-z]{2}|[0-9]{3}))?$

sylius_shop_product_show:
    path: /{_locale}/products/{slug}
    methods: [GET]
    defaults:
        _controller: sylius.controller.product::showAction
        _sylius:
            template: "@SyliusShop/product/show.html.twig"
            repository:
                method: findOneByChannelAndSlug
                arguments:
                    - "expr:service('sylius.context.channel').getChannel()"
                    - "expr:service('sylius.context.locale').getLocaleCode()"
                    - $slug
    requirements:
        _locale: ^[A-Za-z]{2,4}(_([A-Za-z]{4}|[0-9]{3}))?(_([A-Za-z]{2}|[0-9]{3}))?$
        slug: .+

app_about_us:
    path: /{_locale}/qui-sommes-nous
    methods: [GET]
    controller: App\Controller\AboutUsController::index
    requirements:
        _locale: ^[A-Za-z]{2,4}(_([A-Za-z]{4}|[0-9]{3}))?(_([A-Za-z]{2}|[0-9]{3}))?$

app_about_us_redirect:
    path: /qui-sommes-nous
    controller: Symfony\Bundle\FrameworkBundle\Controller\RedirectController::redirectAction
    defaults:
        route: app_about_us
        permanent: true
        _locale: fr_FR

