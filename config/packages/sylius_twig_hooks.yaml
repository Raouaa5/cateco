sylius_twig_hooks:
    hooks:
        # Navbar hook
        'sylius_shop.base.header.navbar':
            cateco_navbar:
                template: '@SyliusShop/shared/layout/base/header/cateco_navbar.html.twig'
                priority: 100
        # Homepage products hook
        'sylius.shop.homepage.products':
            default:
                template: '@SyliusShop/Homepage/_product_card.html.twig'
                priority: 100
        # Forcibly disable the parts causing white space above the navbar
        'sylius_shop.base.header':
            top_bar:
                enabled: false
            content:
                enabled: false
        # Cart page: disable Sylius default suggestions + inject CATECO recommendations
        'sylius_shop.cart.index.content':
            suggested_products:
                enabled: false
            cateco_cart_recommendations:
                template: '@SyliusShop/Cart/_recommendations.html.twig'
                priority: -50
        # Disable Mollie Cart Subscription Columns
        'sylius_shop.cart.index.content.form.sections.general.items.head':
            recurring:
                enabled: false
        'sylius_shop.cart.index.content.form.sections.general.items.body':
            recurring_settings:
                enabled: false

                
        # Forcibly configure Sylius 2 to use legacy manual overrides for Address Checkout Forms
        'sylius_shop.checkout.address.content.form.addresses#billing_required':
            billing_address:
                template: '@SyliusShop/checkout/address/content/form/billing_address.html.twig'
                priority: 200
            different_shipping_address:
                template: '@SyliusShop/checkout/address/content/form/addresses/different_address.html.twig'
                configuration: { type: 'shipping', field: 'differentShippingAddress' }
                priority: 100
            shipping_address:
                template: '@SyliusShop/checkout/address/content/form/shipping_address.html.twig'
                priority: 0

        'sylius_shop.checkout.address.content.form.addresses#shipping_required':
            shipping_address:
                template: '@SyliusShop/checkout/address/content/form/shipping_address.html.twig'
                priority: 200
            different_billing_address:
                template: '@SyliusShop/checkout/address/content/form/addresses/different_address.html.twig'
                configuration: { type: 'billing', field: 'differentBillingAddress' }
                priority: 100
            billing_address:
                template: '@SyliusShop/checkout/address/content/form/billing_address.html.twig'
                priority: 0

        # Enable sidebar on Address Checkout Step
        'sylius_shop.checkout.address.sidebar':
            summary:
                template: '@SyliusShop/checkout/address/sidebar.html.twig'
                priority: 100

        # ── CATECO ML Recommendations ─────────────────────────────────────────
        # Injected below the product content on the product show page
        'sylius.shop.product.show.content':
            cateco_recommendations:
                template: '@SyliusShop/product/show/_recommendations.html.twig'
                priority: -100   # always after the main product block

